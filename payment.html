<!DOCTYPE html>
<html>
<head>
<title>DMSkills Payment</title>

<style>

body{
font-family: Arial;
background:#eef2f5;
text-align:center;
padding-top:80px;
}

.card{
background:white;
width:350px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.title{
font-size:28px;
color:#2c6fa3;
margin-bottom:20px;
}

.amount{
font-size:40px;
font-weight:bold;
margin-bottom:25px;
}

.btn{
background:#1fa34a;
color:white;
padding:15px 30px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#148437;
}

</style>
</head>

<body>

<div class="card">

<div class="title">DMSkills Subscription</div>

<div class="amount">₹29</div>

<button class="btn" onclick="payNow()">Pay Now</button>

</div>

<script>

function payNow(){

// CHANGE THIS TO YOUR UPI ID
let upi = "upi://pay?pa=yourupiid@upi&pn=DMSkills&am=29&cu=INR";

window.location.href = upi;

}

</script>

</body>
</html>
