<!DOCTYPE html>
<html>
<head>
<title>DMSkills Payment</title>

<style>

body{
font-family:Arial;
background:#eef2f5;
text-align:center;
padding-top:60px;
}

.card{
background:white;
width:350px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.title{
font-size:26px;
color:#2c6fa3;
margin-bottom:10px;
}

.amount{
font-size:40px;
font-weight:bold;
margin-bottom:20px;
}

.qr{
margin:20px 0;
}

.btn{
background:#1fa34a;
color:white;
padding:14px 28px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#148437;
}

.note{
margin-top:15px;
font-size:14px;
color:#666;
}

</style>
</head>

<body>

<div class="card">

<div class="title">📘 DMSkills Subscription</div>

<div class="amount">₹29</div>

<div>Scan QR or click Pay</div>

<div class="qr">

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=mohit@okaxis&pn=DMSkills&am=29&cu=INR">

</div>

<button class="btn" onclick="payNow()">Pay Now</button>

<div class="note">
UPI / GPay / PhonePe / Paytm
</div>

</div>

<script>

function payNow(){

let upi="upi://pay?pa=mohit@okaxis&pn=DMSkills&am=29&cu=INR";

window.location.href=upi;

setTimeout(function(){
window.location.href="success.html";
},5000);

}
</script>

</body>
</html>
