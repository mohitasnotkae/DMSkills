<!DOCTYPE html>
<html>
<head>
<title>DMSkills</title>

<style>

body{
font-family: Arial;
background:#eef2f5;
text-align:center;
padding-top:60px;
}

.card{
background:white;
width:320px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.logo{
font-size:28px;
font-weight:bold;
color:#2c6fa3;
margin-bottom:20px;
}

.days{
font-size:40px;
color:#2c6fa3;
font-weight:bold;
}

.text{
font-size:20px;
margin-bottom:25px;
}

.btn{
background:#1fa34a;
color:white;
padding:15px 30px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#148437;
}

.pay{
margin-top:20px;
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">📘 DMSkills</div>

<div class="days">30 Days</div>

<div class="text">Unlimited Study Material</div>

<button class="btn" onclick="goToPayment()">₹29 Subscribe</button>

 <br><br>

<button class="btn" onclick="checkLogin()">Login</button> 
  
<div class="pay">
Pay via UPI / GPay / Paytm
</div>

</div>

<script>

function goToPayment(){
window.location.href = "payment.html";
}

function checkLogin(){

var userId = localStorage.getItem("userId");

if(userId){

window.location.href="login.html";

}else{

alert("Please subscribe first and generate account.");

}

}

</script>
