<!DOCTYPE html>
<html>
<head>
<title>DMSkills Exam App</title>

<style>

body{
font-family:Arial;
background:#eef2f5;
text-align:center;
padding-top:60px;
}

.card{
background:white;
width:320px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
background:#007bff;
color:white;
border-radius:6px;
cursor:pointer;
}

input{
padding:8px;
width:90%;
margin:5px;
}

.page{
display:none;
}

</style>
</head>

<body>

<!-- HOME PAGE -->

<div id="home" class="card page" style="display:block">

<h2>DMSkills</h2>
<p>Prepare for Government & Private Exams</p>

<h3>Full Access ₹29</h3>

<button onclick="showPage('payment')">Buy Now</button>

</div>



<!-- PAYMENT PAGE -->

<div id="payment" class="card page">

<h3>Payment ₹29</h3>

<p>Pay using any UPI app</p>

<p>UPI ID: dmskills@upi</p>

<button onclick="paymentDone()">I Paid</button>

</div>



<!-- LOGIN PAGE -->

<div id="login" class="card page">

<h3>Login</h3>

<input id="loginUser" placeholder="User ID">

<input id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>

</div>



<!-- SUBJECT PAGE -->

<div id="subjects" class="card page">

<h3>Select Subject</h3>

<button onclick="startTest()">Math</button><br>

<button onclick="startTest()">Reasoning</button><br>

<button onclick="startTest()">General Knowledge</button>

</div>



<!-- TEST PAGE -->

<div id="test" class="card page">

<h3>Mock Test</h3>

<p>1. 2 + 2 = ?</p>

<button onclick="checkAnswer(3)">3</button>
<button onclick="checkAnswer(4)">4</button>
<button onclick="checkAnswer(5)">5</button>

</div>



<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p => p.style.display="none");

document.getElementById(page).style.display="block";

}



function paymentDone(){

var userId = Math.floor(10000 + Math.random() * 90000);
var password = Math.floor(100000 + Math.random() * 900000);

localStorage.setItem("userId", userId);
localStorage.setItem("password", password);

alert(
"DMSkills Account\n\nUser ID: " + userId +
"\nPassword: " + password +
"\n\nSave this for login."
);

showPage("login");

}



function login(){

var id = document.getElementById("loginUser").value;
var pass = document.getElementById("loginPass").value;

if(id == localStorage.getItem("userId") && pass == localStorage.getItem("password")){

showPage("subjects");

}else{

alert("Wrong ID or Password");

}

}



function startTest(){

showPage("test");

}



function checkAnswer(ans){

if(ans==4){

alert("Correct Answer 🎉");

}else{

alert("Wrong Answer");

}

}

</script>

</body>
</html>
