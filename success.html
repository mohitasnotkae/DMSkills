<!DOCTYPE html>
<html>
<head>
<title>Payment Success - DMSkills</title>

<style>

body{
font-family:Arial;
background:#eef2f5;
text-align:center;
padding-top:80px;
}

.card{
background:white;
width:350px;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.success{
font-size:50px;
color:green;
}

.title{
font-size:28px;
margin-top:10px;
}

.text{
margin-top:15px;
font-size:16px;
color:#555;
}

.btn{
margin-top:25px;
background:#2c6fa3;
color:white;
padding:14px 28px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#1d4e75;
}

</style>
</head>

<body>

<div class="card">

<div class="success">✅</div>

<div class="title">Payment Successful</div>

<div class="text">
Your ₹29 subscription is activated.
</div>

<button class="btn" onclick="createAccount()">Generate Account</button>

</div>

<script>

function createAccount(){

let userID = Math.floor(10000 + Math.random() * 90000);
let password = Math.floor(100000 + Math.random() * 900000);
  
localStorage.setItem("userid",userID);
localStorage.setItem("password",password);
  
alert(
"DMSkills Account\n\nUser ID: " + userID +
"\nPassword: " + password +
"\n\nSave this for login."
);

}

</script>

</body>
</html>
