<!DOCTYPE html>
<html>
<head>
<title>DMSkills Login</title>

<style>

body{
font-family:Arial;
background:#eef2f5;
text-align:center;
padding-top:100px;
}

.card{
background:white;
width:320px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#2c6fa3;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1e4f78;
}

</style>
</head>

<body>

<div class="card">

<h2>DMSkills Login</h2>

<input type="text" placeholder="User ID"><br>

<input type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>

<script>

function login(){
alert("Login Successful");
window.location.href="subjects.html";
}

</script>

</body>
</html>
