<!DOCTYPE html>
<html>
<head>
<title>DMSkills Login</title>

<style>

body{
font-family:Arial;
background:#eef2f5;
text-align:center;
padding-top:80px;
}

.card{
background:white;
width:350px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.title{
font-size:26px;
color:#2c6fa3;
margin-bottom:20px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.btn{
background:#1fa34a;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#148437;
}

</style>
</head>

<body>

<div class="card">

<div class="title">📘 DMSkills Login</div>

<input type="text" id="userid" placeholder="Enter User ID">

<input type="password" id="password" placeholder="Enter Password">

<br>

<button class="btn" onclick="login()">Login</button>

</div>

<script>

function login(){

let uid=document.getElementById("userid").value;
let pass=document.getElementById("password").value;

if(uid==localStorage.getItem("userid") && pass==localStorage.getItem("password")){
alert("Login Successful");
}else{
alert("Invalid User ID or Password");
}

}

</script>

</body>
</html>
